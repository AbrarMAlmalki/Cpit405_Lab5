<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NBA Stats | Interactive Player Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<<body>
<div class="app-container">
    <div class="header">
        <h1> NBA Player Stats</h1>
        <button id="darkModeToggle" class="dark-btn">Dark Mode</button>
    </div>

    <div class="filters">
        <input type="text" id="searchInput" class="search-input" placeholder="Search by name...">
        <select id="teamFilter" class="team-select">
            <option value="all">All Teams</option>
        </select>
        <div id="playerCount" class="counter-badge">0 players</div>
    </div>

    <div class="table-wrapper">
        <table id="statsTable">
            <thead>
                <tr>
                    <th data-sort="name">Player</th>
                    <th data-sort="team">Team</th>
                    <th data-sort="points">PTS</th>
                    <th data-sort="rebounds">REB</th>
                    <th data-sort="assists">AST</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5" style="text-align:center;">Loading players...</td></tr>
            </tbody>
        </table>
    </div>
   
</div>

<script src="script.js"></script>
</body>
</html>
